<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Galaxy gradient -->
    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </radialGradient>

    <!-- Star gradient -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#a78bfa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>

    <!-- Nebula gradient for the A -->
    <linearGradient id="nebulaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>

    <!-- Glowing effect filter -->
    <filter id="cosmicGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star twinkle filter -->
    <filter id="starTwinkle" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <circle cx="50" cy="50" r="50" fill="url(#galaxyGradient)"/>

  <!-- Spiral galaxy arms (subtle background) -->
  <g opacity="0.15">
    <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="#8b5cf6" stroke-width="8" transform="rotate(-20 50 50)"/>
    <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="#6366f1" stroke-width="6" transform="rotate(20 50 50)"/>
  </g>

  <!-- Scattered stars -->
  <g filter="url(#starTwinkle)">
    <circle cx="20" cy="25" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="75" cy="20" r="1" fill="white" opacity="0.7"/>
    <circle cx="82" cy="45" r="1.2" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="18" cy="65" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="30" cy="80" r="1" fill="#a78bfa" opacity="0.7"/>
    <circle cx="70" cy="75" r="1.3" fill="white" opacity="0.8"/>
    <circle cx="85" cy="68" r="0.9" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="25" cy="45" r="0.7" fill="white" opacity="0.5"/>
  </g>

  <!-- Main "A" lettermark with nebula gradient -->
  <g filter="url(#cosmicGlow)">
    <path d="M 50 20 L 28 80 L 34 80 L 40 64 L 60 64 L 66 80 L 72 80 L 50 20 Z M 43 59 L 50 40 L 57 59 Z"
          fill="url(#nebulaGradient)"/>
  </g>

  <!-- Bright star at the top of the A -->
  <circle cx="50" cy="30" r="3" fill="url(#starGlow)" filter="url(#starTwinkle)"/>

  <!-- Subtle orbital ring -->
  <ellipse cx="50" cy="50" rx="42" ry="42" fill="none" stroke="url(#nebulaGradient)" stroke-width="1" opacity="0.3"/>
</svg>
